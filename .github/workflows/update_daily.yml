name: AirSentinel - Mise à jour quotidienne

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC tous les jours
  workflow_dispatch: # Lancement manuel possible

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installation des dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install openmeteo-requests requests-cache retry-requests pyarrow

      - name: Mise à jour des données
        run: python update_daily.py

      - name: Commit et push des nouvelles données
        run: |
          git config --local user.email "bot@airsentinel.cm"
          git config --local user.name "AirSentinel Update Bot"
          git add data/processed/dataset_final.parquet
          git diff --staged --quiet || (git commit -m "Auto-update: Données du $(date +'%Y-%m-%d')" && git push origin master)